body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;

}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  width: 100%;
  height: 120%;
  background: url("https://raw.githubusercontent.com/mohamedahmed0361-aba/mohamed-aba-site/main/IMG_7694.png") center/cover no-repeat;
}

.hero-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 40px 25px;
  max-width: 320px;
}

/* الجملة */
.hero-top {
  font-size: 20px;
  font-weight: bold;
  color: #e2e8f0;
}

/* الاسم */
.hero-content h1 {
  font-size: 34px;
  margin-top: 10px;
}

/* النص (المهم 👇) */
.hero-sub {
  margin-top: auto; /* 👈 ده السحر */
  margin-bottom: 120px;
  color: #22c55e;
}

/* الشهادة */
.degree {
  font-size: 13px;
  color: #cbd5f5;
}

/* الزرار */
.hero-btn {
  background: #22c55e;
  padding: 12px 20px;
  border-radius: 10px;
  color: black;
  text-decoration: none;
  font-weight: bold;
  margin-top: 15px;
}

/* CARDS */
.card {
  background: #1e293b;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  opacity: 0;
  transition: 0.8s;
}
