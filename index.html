<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محمد | ABA Therapist</title>

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #f5f7fa;
  color: #333;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

header {
  text-align: center;
  padding: 40px;
}

header img {
  width: 170px;
  border-radius: 50%;
  border: 4px solid #00c9a7;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #00c9a7; }
  to { box-shadow: 0 0 25px #00c9a7; }
}

section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin: 15px 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

.btn {
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  margin: 10px;
  color: white;
  font-size: 15px;
}

.whatsapp { background: #25D366; }
.instagram { background: #E1306C; }
.booking { background: linear-gradient(45deg,#00c9a7,#00b4d8); }

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/mohamedahmed0361-aba/mohamed-aba-site/main/IMG_7068.jpeg">
<h1>محمد أحمد غريب</h1>
<p>ABA Therapist | أخصائي اضطراب طيف التوحد</p>
</header>

<section>

<div class="card">
<h2>👤 نبذة عني</h2>
<p>معالج تحليل سلوك تطبيقي (ABA) متخصص في أطفال التوحد وتطوير مهارات التواصل.</p>
</div>

<div class="card">
<h2>📞 تواصل</h2>
<a class="btn whatsapp" href="https://wa.me/201098961264">واتساب مصر</a>
<a class="btn whatsapp" href="https://wa.me/96871599794">واتساب عمان</a>
<a class="btn instagram" href="#">إنستجرام</a>
</div>

<div class="card">
<h2>📅 احجز جلسة</h2>

<input type="text" placeholder="اسمك">
<input type="text" placeholder="رقمك">
<textarea placeholder="تفاصيل"></textarea>

<button class="btn booking" onclick="smartBooking()">احجز الآن 🚀</button>

</div>

</section>

<script>
function smartBooking() {
  var name = document.querySelector('input[placeholder="اسمك"]').value;
  var phone = document.querySelector('input[placeholder="رقمك"]').value;
  var details = document.querySelector('textarea').value;

  if (name === "" || phone === "") {
    alert("من فضلك اكتب اسمك ورقمك");
    return;
  }

  var message = "مرحبا 👋\n"
              + "أريد حجز جلسة ABA\n\n"
              + "👤 الاسم: " + name + "\n"
              + "📱 الرقم: " + phone + "\n"
              + "📝 التفاصيل: " + details;

  var url = "";

  if (phone.startsWith("01")) {
    url = "https://wa.me/201098961264?text=" + encodeURIComponent(message);
  } else {
    url = "https://wa.me/96871599794?text=" + encodeURIComponent(message);
  }

  window.open(url, '_blank');
}
</script>

</body>
</html>
