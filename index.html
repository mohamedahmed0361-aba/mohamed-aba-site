<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Ahmed Ghareib</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #fff;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  width: 100%;
  height: 110%;
  background: url("https://raw.githubusercontent.com/mohamedahmed0361-aba/mohamed-aba-site/main/IMG_7694.png") center/cover no-repeat;
}

.hero-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 40px 25px;
  max-width: 320px;
}

.hero-top {
  font-size: 24px;
  font-weight: bold;
  animation: fadeDown 1s ease;
}

.hero-content h1 {
  font-size: 38px;
  margin-top: 10px;
  animation: fadeDown 1.3s ease;
}

.hero-sub {
  margin-top: auto;
  margin-bottom: 120px;
  color: #22c55e;
  font-size: 18px;
  line-height: 1.7;
  animation: fadeUp 1.5s ease;
}

.degree {
  font-size: 15px;
  color: #cbd5f5;
}

.hero-btn {
  background: #22c55e;
  padding: 13px 22px;
  border-radius: 12px;
  color: black;
  text-decoration: none;
  font-weight: bold;
  margin-top: 15px;
  transition: 0.3s;
}

.hero-btn:hover {
  transform: scale(1.05);
}

/* CARDS */
.card {
  background: #1e293b;
  margin: 20px;
  padding: 22px;
  border-radius: 15px;
  opacity: 0;
  transition: 0.8s;
}

.card h2 {
  font-size: 21px;
  margin-bottom: 15px;
}

.card.right { transform: translateX(80px); }
.card.left { transform: translateX(-80px); }

.card.show {
  opacity: 1;
  transform: translateX(0);
}

/* LIST */
.list div {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeItem 0.5s forwards;
}

.list div:nth-child(1){ animation-delay: 0.2s }
.list div:nth-child(2){ animation-delay: 0.4s }
.list div:nth-child(3){ animation-delay: 0.6s }
.list div:nth-child(4){ animation-delay: 0.8s }
.list div:nth-child(5){ animation-delay: 1s }
.list div:nth-child(6){ animation-delay: 1.2s }
.list div:nth-child(7){ animation-delay: 1.4s }
.list div:nth-child(8){ animation-delay: 1.6s }

/* CONTACT */
.contact-btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.contact-btns a {
  padding: 10px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

.whatsapp { background: #25d366; }
.facebook { background: #1877f2; }
.instagram { background: #e1306c; }
.call { background: gray; }

/* FLOAT */
.float {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #25d366;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ANIMATIONS */
@keyframes fadeItem {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeDown {
  from {opacity:0; transform: translateY(-20px)}
  to {opacity:1; transform: translateY(0)}
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(20px)}
  to {opacity:1; transform: translateY(0)}
}

</style>
</head>

<body>

<section class="hero">
<div class="hero-bg"></div>
<div class="hero-overlay"></div>

<div class="hero-content">

<div class="hero-top">
