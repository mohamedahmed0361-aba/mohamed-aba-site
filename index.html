<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Ahmed Ghareib</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #fff;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
}

.hero-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://raw.githubusercontent.com/mohamedahmed0361-aba/mohamed-aba-site/main/IMG_7694.png") center/cover no-repeat;
}

.hero-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-end;
  padding: 30px;
}

.hero-top {
  font-size: 22px;
  margin-bottom: 10px;
}

.hero-content h1 {
  font-size: 32px;
  margin: 10px 0;
}

.hero-sub {
  margin-top: 10px;
  color: #22c55e;
}

/* زرار رئيسي */
.main-btn {
  margin-top: 25px;
  background: #22c55e;
  padding: 16px 28px;
  border-radius: 14px;
  color: black;
  text-decoration: none;
  font-weight: bold;

  /* 💀 Glow تقيل */
  box-shadow: 0 0 10px #22c55e, 0 0 25px #22c55e, 0 0 50px #22c55e;

  /* حركة */
  animation: floatBtn 2s infinite ease-in-out;
}

/* زرار popup */
.popup-btn {
  position: fixed;
  bottom: -100px;
  right: 20px;
  background: #22c55e;
  padding: 14px 22px;
  border-radius: 12px;
  color: black;
  font-weight: bold;
  text-decoration: none;

  box-shadow: 0 0 10px #22c55e, 0 0 25px #22c55e, 0 0 50px #22c55e;

  animation: floatBtn 2s infinite ease-in-out;
  transition: 0.5s;
}

.popup-btn.show {
  bottom: 30px;
}

/* حركة خفيفة */
@keyframes floatBtn {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="hero-bg"></div>
<div class="hero-overlay"></div>

<div class="hero-content">

<div class="hero-top">
ابدأ رحلة تطوير مهارات طفلك بثقة واحترافية
</div>

<h1>Mohamed Ahmed Ghareib</h1>

<p class="hero-sub">
ASD Specialist | ABAT | IBT <br>
B.Sc. Disability & Rehabilitation
</p>

<a href="https://wa.me/201010827183?text=السلام%20عليكم%20ورحمة%20الله%20وبركاته%0Aمحتاج%20استشارة%20بخصوص%20طفلي."
class="main-btn"
onclick="playSound()">
تواصل معي
</a>

</div>
</section>

<!-- زرار يظهر بعد 5 ثواني -->
<a href="https://wa.me/201010827183?text=السلام%20عليكم%20ورحمة%20الله%20وبركاته%0Aمحتاج%20استشارة%20بخصوص%20طفلي."
class="popup-btn"
id="popupBtn"
onclick="playSound()">
تواصل معي
</a>

<!-- صوت -->
<audio id="clickSound" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>

function playSound(){
  let sound = document.getElementById("clickSound");

  sound.currentTime = 0;
  sound.play().catch(e => {});

  if (navigator.vibrate) {
    navigator.vibrate(100);
  }
}

/* يظهر بعد 5 ثواني */
setTimeout(() => {
  document.getElementById("popupBtn").classList.add("show");
}, 5000);

</script>

</body>
</html>
